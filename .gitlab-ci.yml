stages:
  - validate
  - build
  - package
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: /certs
  DOCKER_BUILDKIT: "1"
  HELM_RELEASE_NAME: rivet

validate:api:
  stage: validate
  image: node:20-alpine
  before_script:
    - apk add --no-cache git
    - |
      if [ ! -d rivet ] || [ -z "$(ls -A rivet 2>/dev/null)" ]; then
        npm run setup:rivet
      fi
    - npm --prefix wrapper/api ci
  script:
    - npm --prefix wrapper/api run build
    - npm --prefix wrapper/api test

validate:helm:
  stage: validate
  image: alpine/helm:3.17.2
  script:
    - export HELM_VALIDATE_IMAGE_BASE="${CI_REGISTRY_IMAGE:-registry.example.com/rivet}"
    - >
      helm lint charts -f charts/overlays/test.yaml
      --set-string images.proxy.repository="$HELM_VALIDATE_IMAGE_BASE/proxy"
      --set-string images.web.repository="$HELM_VALIDATE_IMAGE_BASE/web"
      --set-string images.api.repository="$HELM_VALIDATE_IMAGE_BASE/api"
      --set-string images.executor.repository="$HELM_VALIDATE_IMAGE_BASE/executor"
    - >
      helm template "$HELM_RELEASE_NAME" charts -f charts/overlays/test.yaml
      --set-string images.proxy.repository="$HELM_VALIDATE_IMAGE_BASE/proxy"
      --set-string images.web.repository="$HELM_VALIDATE_IMAGE_BASE/web"
      --set-string images.api.repository="$HELM_VALIDATE_IMAGE_BASE/api"
      --set-string images.executor.repository="$HELM_VALIDATE_IMAGE_BASE/executor"
      > /tmp/rivet-test.yaml
    - >
      helm template "$HELM_RELEASE_NAME" charts -f charts/overlays/prod.yaml
      --set-string images.proxy.repository="$HELM_VALIDATE_IMAGE_BASE/proxy"
      --set-string images.web.repository="$HELM_VALIDATE_IMAGE_BASE/web"
      --set-string images.api.repository="$HELM_VALIDATE_IMAGE_BASE/api"
      --set-string images.executor.repository="$HELM_VALIDATE_IMAGE_BASE/executor"
      > /tmp/rivet-prod.yaml
    - |
      if helm template "$HELM_RELEASE_NAME" charts -f charts/overlays/test.yaml >/tmp/placeholder.out 2>/tmp/placeholder.err; then
        echo "expected placeholder image repository validation to fail" >&2
        exit 1
      fi
    - |
      if helm template "$HELM_RELEASE_NAME" charts -f charts/overlays/test.yaml \
        --set-string images.proxy.repository="$HELM_VALIDATE_IMAGE_BASE/proxy" \
        --set-string images.web.repository="$HELM_VALIDATE_IMAGE_BASE/web" \
        --set-string images.api.repository="$HELM_VALIDATE_IMAGE_BASE/api" \
        --set-string images.executor.repository="$HELM_VALIDATE_IMAGE_BASE/executor" \
        --set-string env.RIVET_PUBLISHED_WORKFLOWS_BASE_PATH=/custom >/tmp/route-prefix.out 2>/tmp/route-prefix.err; then
        echo "expected route-prefix validation to fail" >&2
        exit 1
      fi
    - |
      if helm template "$HELM_RELEASE_NAME" charts -f charts/overlays/test.yaml \
        --set-string images.proxy.repository="$HELM_VALIDATE_IMAGE_BASE/proxy" \
        --set-string images.web.repository="$HELM_VALIDATE_IMAGE_BASE/web" \
        --set-string images.api.repository="$HELM_VALIDATE_IMAGE_BASE/api" \
        --set-string images.executor.repository="$HELM_VALIDATE_IMAGE_BASE/executor" \
        --set replicaCount.backend=2 >/tmp/backend-scale.out 2>/tmp/backend-scale.err; then
        echo "expected backend replica validation to fail" >&2
        exit 1
      fi
    - |
      if helm template "$HELM_RELEASE_NAME" charts -f charts/overlays/test.yaml \
        --set-string images.proxy.repository="$HELM_VALIDATE_IMAGE_BASE/proxy" \
        --set-string images.web.repository="$HELM_VALIDATE_IMAGE_BASE/web" \
        --set-string images.api.repository="$HELM_VALIDATE_IMAGE_BASE/api" \
        --set-string images.executor.repository="$HELM_VALIDATE_IMAGE_BASE/executor" \
        --set-string auth.keySecretName= >/tmp/auth-key.out 2>/tmp/auth-key.err; then
        echo "expected shared-key validation to fail" >&2
        exit 1
      fi
    - |
      if helm template "$HELM_RELEASE_NAME" charts -f charts/overlays/test.yaml \
        --set-string images.proxy.repository="$HELM_VALIDATE_IMAGE_BASE/proxy" \
        --set-string images.web.repository="$HELM_VALIDATE_IMAGE_BASE/web" \
        --set-string images.api.repository="$HELM_VALIDATE_IMAGE_BASE/api" \
        --set-string images.executor.repository="$HELM_VALIDATE_IMAGE_BASE/executor" \
        --set-string workflowStorage.backend=filesystem \
        --set-string runtimeLibraries.backend=filesystem >/tmp/filesystem.out 2>/tmp/filesystem.err; then
        echo "expected phase-4 managed-backend validation to fail" >&2
        exit 1
      fi

build:images:
  stage: build
  image: docker:27.1.1-cli
  services:
    - docker:27.1.1-dind
  parallel:
    matrix:
      - SERVICE: proxy
      - SERVICE: web
      - SERVICE: api
      - SERVICE: executor
  before_script:
    - apk add --no-cache git nodejs npm
    - |
      if [ ! -d rivet ] || [ -z "$(ls -A rivet 2>/dev/null)" ]; then
        npm run setup:rivet
      fi
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - export IMAGE_REPOSITORY="$CI_REGISTRY_IMAGE/$SERVICE"
    - docker build --pull -f "image/$SERVICE/Dockerfile" -t "$IMAGE_REPOSITORY:$CI_COMMIT_SHA" .
    - docker push "$IMAGE_REPOSITORY:$CI_COMMIT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$IMAGE_REPOSITORY:$CI_COMMIT_SHA" "$IMAGE_REPOSITORY:latest"
        docker push "$IMAGE_REPOSITORY:latest"
      fi

package:chart:
  stage: package
  image: alpine/helm:3.17.2
  script:
    - mkdir -p dist
    - helm package charts --destination dist
  artifacts:
    paths:
      - dist/*.tgz
    expire_in: 7 days

.deploy-template:
  stage: deploy
  image: alpine/helm:3.17.2
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
  script:
    - >
      helm upgrade --install "$HELM_RELEASE_NAME" charts
      --namespace "$K8S_NAMESPACE"
      --create-namespace
      -f "$HELM_OVERLAY"
      --set-string images.proxy.repository="$CI_REGISTRY_IMAGE/proxy"
      --set-string images.proxy.tag="$CI_COMMIT_SHA"
      --set-string images.web.repository="$CI_REGISTRY_IMAGE/web"
      --set-string images.web.tag="$CI_COMMIT_SHA"
      --set-string images.api.repository="$CI_REGISTRY_IMAGE/api"
      --set-string images.api.tag="$CI_COMMIT_SHA"
      --set-string images.executor.repository="$CI_REGISTRY_IMAGE/executor"
      --set-string images.executor.tag="$CI_COMMIT_SHA"
      ${HELM_EXTRA_ARGS}

deploy:test:
  extends: .deploy-template
  variables:
    HELM_OVERLAY: charts/overlays/test.yaml
    K8S_NAMESPACE: rivet-test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

deploy:prod:
  extends: .deploy-template
  variables:
    HELM_OVERLAY: charts/overlays/prod.yaml
    K8S_NAMESPACE: rivet-prod
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
