<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rivet Access</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(96, 165, 250, 0.18), transparent 34%),
          linear-gradient(180deg, #121419 0%, #0b0d11 100%);
        font-family: Georgia, "Times New Roman", serif;
        color: #f3f4f6;
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
      }
      .modal {
        position: relative;
        width: min(440px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 18px;
        background: rgba(18, 20, 25, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 31px;
        line-height: 1.05;
      }
      p {
        margin: 0 0 18px;
        font-size: 16px;
        line-height: 1.55;
        color: rgba(243, 244, 246, 0.78);
      }
      form {
        display: grid;
        gap: 12px;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      label {
        font-size: 14px;
        color: rgba(243, 244, 246, 0.84);
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        padding: 12px 14px;
        font: inherit;
      }
      input:focus {
        outline: 2px solid rgba(96, 165, 250, 0.75);
        outline-offset: 2px;
      }
      button {
        border: none;
        border-radius: 12px;
        background: #f3f4f6;
        color: #111827;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .error {
        min-height: 20px;
        font-size: 14px;
        color: #fca5a5;
      }
      .hint {
        margin-top: 12px;
        font-size: 13px;
        color: rgba(243, 244, 246, 0.52);
      }
    </style>
  </head>
  <body>
    <div class="overlay" aria-hidden="true"></div>
    <main class="modal" role="dialog" aria-modal="true" aria-labelledby="gate-title">
      <h1 id="gate-title">Enter Access Key</h1>
      <p>Provide the Rivet key to open this host in the browser.</p>
      <form id="gate-form" method="post" action="/__rivet_auth">
        <label for="gate-username" class="sr-only">Username</label>
        <input
          id="gate-username"
          class="sr-only"
          name="username"
          type="text"
          value="Rivet"
          autocomplete="username"
          autocapitalize="none"
          spellcheck="false"
          required
        >
        <label for="gate-key">Access key</label>
        <input id="gate-key" name="key" type="password" autocomplete="current-password" autofocus required>
        <button type="submit">Continue</button>
        <div id="gate-error" class="error" aria-live="polite"></div>
      </form>
      <div class="hint">Token-free hosts still bypass this prompt automatically.</div>
    </main>
    <script>
      (function () {
        const input = document.getElementById("gate-key");
        const error = document.getElementById("gate-error");
        const params = new URLSearchParams(window.location.search);
        const authError = params.get("auth_error");
        if (authError === "invalid") {
          error.textContent = "Access key was rejected. Try again.";
        } else if (authError === "forbidden" || authError === "unavailable") {
          error.textContent = "Unable to authenticate right now.";
        }
        if (authError) {
          params.delete("auth_error");
          const nextSearch = params.toString();
          history.replaceState(null, "", window.location.pathname + (nextSearch ? "?" + nextSearch : "") + window.location.hash);
          input.focus();
          input.select();
        }
      }());
    </script>
  </body>
</html>
