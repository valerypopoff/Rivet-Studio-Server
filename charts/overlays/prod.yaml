ingress:
  enabled: true
  className: nginx
  host: rivet.example.com
  externalDNSHostname: rivet.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"

vault:
  enabled: true
  annotations: {}
  role: rivet-prod
  secretPath: secret/data/rivet/prod/dotenv
  dotenvTemplate: |
    {{- with secret "secret/data/rivet/prod/dotenv" -}}
    {{- range $key, $value := .Data.data }}
    {{ $key }}={{ $value | toJSON }}
    {{- end }}
    {{- end }}

workflowStorage:
  backend: managed

runtimeLibraries:
  backend: managed
  cache:
    enabled: false

postgres:
  mode: managed
  host: postgres-prod.example.internal
  port: 5432
  database: rivet
  username: rivet
  passwordSecretName: rivet-postgres
  sslMode: require

objectStorage:
  endpoint: https://s3.amazonaws.com
  bucket: rivet-prod
  region: us-east-1
  prefix: workflows/
  accessKeySecretName: rivet-object-storage
  secretKeySecretName: rivet-object-storage
  forcePathStyle: false

storage:
  appData:
    enabled: true
    size: 20Gi
    storageClassName: gp3

auth:
  keySecretName: rivet-shared-key

replicaCount:
  proxy: 2
  web: 2
  backend: 1
  execution: 2

autoscaling:
  proxy:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
  web:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
  backend:
    enabled: false
  execution:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
