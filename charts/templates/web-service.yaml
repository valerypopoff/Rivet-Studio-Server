apiVersion: v1
kind: Service
metadata:
  name: {{ include "rivet.webServiceName" . }}
  labels:
    {{- include "rivet.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    {{- include "rivet.componentLabels" (dict "root" . "component" "web") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.web.port }}
      targetPort: http
