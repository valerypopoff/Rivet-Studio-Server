apiVersion: v1
kind: Service
metadata:
  name: {{ include "rivet.apiServiceName" . }}
  labels:
    {{- include "rivet.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "rivet.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.api.port }}
      targetPort: api-http
