{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "rivet.proxyServiceName" . }}
  labels:
    {{- include "rivet.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
  annotations:
    {{- if .Values.ingress.externalDNSHostname }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.externalDNSHostname | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
{{ toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "rivet.proxyServiceName" . }}
                port:
                  number: {{ .Values.service.proxy.port }}
  {{- if and .Values.ingress.tlsSecretName .Values.ingress.host }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
{{- end }}
