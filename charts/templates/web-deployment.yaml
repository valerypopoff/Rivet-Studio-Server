apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rivet.webServiceName" . }}
  labels:
    {{- include "rivet.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount.web }}
  selector:
    matchLabels:
      {{- include "rivet.componentLabels" (dict "root" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rivet.componentLabels" (dict "root" . "component" "web") | nindent 8 }}
      annotations:
        {{- with .Values.podAnnotations.web }}
{{ toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 10001
      containers:
        - name: web
          image: {{ include "rivet.image" (dict "root" . "image" .Values.images.web) }}
          imagePullPolicy: {{ .Values.images.web.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: {{ .Values.service.web.targetPort }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources.web | nindent 12 }}
