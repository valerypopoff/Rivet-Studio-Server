apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rivet.executionName" . }}
  labels:
    {{- include "rivet.labels" . | nindent 4 }}
    app.kubernetes.io/component: execution
spec:
  replicas: {{ .Values.replicaCount.execution }}
  selector:
    matchLabels:
      {{- include "rivet.componentLabels" (dict "root" . "component" "execution") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rivet.componentLabels" (dict "root" . "component" "execution") | nindent 8 }}
      annotations:
        {{- with .Values.podAnnotations.execution }}
{{ toYaml . | nindent 8 }}
        {{- end }}
        {{- include "rivet.vaultAnnotations" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: api
          image: {{ include "rivet.image" (dict "root" . "image" .Values.images.api) }}
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
          ports:
            - name: api-http
              containerPort: {{ .Values.service.execution.targetPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: api-http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: api-http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: RIVET_VAULT_DOTENV_FILE_NAME
              value: {{ .Values.vault.dotenvFileName | quote }}
            - name: PORT
              value: {{ .Values.service.execution.targetPort | quote }}
            - name: RIVET_API_PROFILE
              value: execution
            - name: RIVET_STORAGE_MODE
              value: {{ .Values.workflowStorage.backend | quote }}
            - name: RIVET_DATABASE_MODE
              value: {{ .Values.postgres.mode | quote }}
            - name: RIVET_DATABASE_SSL_MODE
              value: {{ .Values.postgres.sslMode | quote }}
            - name: RIVET_WORKSPACE_ROOT
              value: /workspace
            - name: RIVET_WORKFLOWS_ROOT
              value: /workflows
            - name: RIVET_APP_DATA_ROOT
              value: /data/rivet-app
            - name: RIVET_RUNTIME_LIBRARIES_ROOT
              value: /data/runtime-libraries
            - name: RIVET_RUNTIME_PROCESS_ROLE
              value: api
            - name: RIVET_RUNTIME_LIBRARIES_REPLICA_TIER
              value: endpoint
            - name: RIVET_RUNTIME_LIBRARIES_JOB_WORKER_ENABLED
              value: "false"
            - name: RIVET_STORAGE_BUCKET
              value: {{ .Values.objectStorage.bucket | quote }}
            - name: RIVET_STORAGE_REGION
              value: {{ .Values.objectStorage.region | quote }}
            - name: RIVET_STORAGE_ENDPOINT
              value: {{ .Values.objectStorage.endpoint | quote }}
            - name: RIVET_STORAGE_PREFIX
              value: {{ .Values.objectStorage.prefix | quote }}
            - name: RIVET_STORAGE_FORCE_PATH_STYLE
              value: {{ .Values.objectStorage.forcePathStyle | quote }}
            {{- if .Values.postgres.connectionStringSecretName }}
            - name: RIVET_DATABASE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.connectionStringSecretName }}
                  key: {{ .Values.postgres.connectionStringSecretKey }}
            {{- else }}
            - name: RIVET_DATABASE_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: RIVET_DATABASE_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: RIVET_DATABASE_NAME
              value: {{ .Values.postgres.database | quote }}
            - name: RIVET_DATABASE_USERNAME
              value: {{ .Values.postgres.username | quote }}
            {{- if .Values.postgres.passwordSecretName }}
            - name: RIVET_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.passwordSecretName }}
                  key: {{ .Values.postgres.passwordSecretKey }}
            {{- end }}
            {{- end }}
            {{- if .Values.objectStorage.accessKeySecretName }}
            - name: RIVET_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStorage.accessKeySecretName }}
                  key: {{ .Values.objectStorage.accessKeySecretKey }}
            {{- end }}
            {{- if .Values.objectStorage.secretKeySecretName }}
            - name: RIVET_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStorage.secretKeySecretName }}
                  key: {{ .Values.objectStorage.secretKeySecretKey }}
            {{- end }}
            {{- if .Values.auth.keySecretName }}
            - name: RIVET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.keySecretName }}
                  key: {{ .Values.auth.keySecretKey }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ tpl (printf "%v" $value) $ | quote }}
            {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: workflows
              mountPath: /workflows
            - name: app-data
              mountPath: /data/rivet-app
            - name: runtime-libraries
              mountPath: /data/runtime-libraries
            {{- if .Values.tmpVolume.enabled }}
            - name: {{ .Values.tmpVolume.name }}
              mountPath: {{ .Values.tmpVolume.path }}
            {{- end }}
          resources:
{{ toYaml .Values.resources.execution | nindent 12 }}
      volumes:
        - name: workspace
          emptyDir: {}
        - name: workflows
          emptyDir: {}
        {{- if .Values.storage.appData.existingClaimName }}
        - name: app-data
          persistentVolumeClaim:
            claimName: {{ .Values.storage.appData.existingClaimName }}
        {{- else }}
        - name: app-data
          emptyDir: {}
        {{- end }}
        {{- if .Values.runtimeLibraries.cache.existingClaimName }}
        - name: runtime-libraries
          persistentVolumeClaim:
            claimName: {{ .Values.runtimeLibraries.cache.existingClaimName }}
        {{- else }}
        - name: runtime-libraries
          emptyDir: {}
        {{- end }}
        {{- if .Values.tmpVolume.enabled }}
        - name: {{ .Values.tmpVolume.name }}
          emptyDir:
            sizeLimit: {{ .Values.tmpVolume.sizeLimit }}
        {{- end }}
