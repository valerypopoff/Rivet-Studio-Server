name: Build Images

on:
  push:
    branches:
      - main-rivet2
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  RIVET_REPO_URL: https://github.com/valerypopoff/rivet2.0.git
  RIVET_REPO_REF: main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            dockerfile: image/proxy/Dockerfile
            image: ghcr.io/valerypopoff/cloud-hosted-rivet2-wrapper/proxy
            platforms: linux/amd64,linux/arm64
          - service: web
            dockerfile: image/web/Dockerfile
            image: ghcr.io/valerypopoff/cloud-hosted-rivet2-wrapper/web
            platforms: linux/amd64,linux/arm64
          - service: api
            dockerfile: image/api/Dockerfile
            image: ghcr.io/valerypopoff/cloud-hosted-rivet2-wrapper/api
            platforms: linux/amd64,linux/arm64
          - service: executor
            dockerfile: image/executor/Dockerfile
            image: ghcr.io/valerypopoff/cloud-hosted-rivet2-wrapper/executor
            platforms: linux/amd64

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Repo Structure
        run: npm run verify:repo-structure

      - name: Bootstrap Upstream Rivet
        run: |
          if [ ! -d rivet ] || [ -z "$(ls -A rivet 2>/dev/null)" ]; then
            npm run setup:rivet
          fi

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main-rivet2' }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-contexts: |
            rivet_source=./rivet
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
