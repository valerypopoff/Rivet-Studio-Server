services:
  workflow-postgres:
    profiles: ["workflow-managed"]
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${RIVET_WORKFLOWS_LOCAL_DOCKER_POSTGRES_DB:-rivet}
      - POSTGRES_USER=${RIVET_WORKFLOWS_LOCAL_DOCKER_POSTGRES_USER:-rivet}
      - POSTGRES_PASSWORD=${RIVET_WORKFLOWS_LOCAL_DOCKER_POSTGRES_PASSWORD:-rivet}
    ports:
      - "${RIVET_WORKFLOWS_LOCAL_DOCKER_POSTGRES_PORT:-54329}:5432"
    volumes:
      - workflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RIVET_WORKFLOWS_LOCAL_DOCKER_POSTGRES_USER:-rivet} -d ${RIVET_WORKFLOWS_LOCAL_DOCKER_POSTGRES_DB:-rivet}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  workflow-minio:
    profiles: ["workflow-managed"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${RIVET_WORKFLOWS_LOCAL_DOCKER_OBJECT_STORAGE_ACCESS_KEY_ID:-minioadmin}
      - MINIO_ROOT_PASSWORD=${RIVET_WORKFLOWS_LOCAL_DOCKER_OBJECT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "${RIVET_WORKFLOWS_LOCAL_DOCKER_OBJECT_STORAGE_PORT:-9000}:9000"
      - "${RIVET_WORKFLOWS_LOCAL_DOCKER_OBJECT_STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - workflow_minio_data:/data
    restart: unless-stopped

  workflow-minio-init:
    profiles: ["workflow-managed"]
    image: minio/mc:latest
    depends_on:
      workflow-minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://workflow-minio:9000 ${RIVET_WORKFLOWS_LOCAL_DOCKER_OBJECT_STORAGE_ACCESS_KEY_ID:-minioadmin} ${RIVET_WORKFLOWS_LOCAL_DOCKER_OBJECT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}; do
          sleep 1;
        done &&
        mc mb -p local/${RIVET_WORKFLOWS_LOCAL_DOCKER_OBJECT_STORAGE_BUCKET:-rivet-workflows} || true
      "
    restart: "no"

volumes:
  workflow_postgres_data:
    driver: local
  workflow_minio_data:
    driver: local
