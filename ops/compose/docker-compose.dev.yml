services:
  proxy:
    image: nginx:alpine
    ports:
      - "${RIVET_PORT:-8080}:80"
    env_file:
      - ../../.env
    environment:
      - RIVET_PUBLISHED_WORKFLOWS_BASE_PATH=${RIVET_PUBLISHED_WORKFLOWS_BASE_PATH:-/workflows}
      - RIVET_LATEST_WORKFLOWS_BASE_PATH=${RIVET_LATEST_WORKFLOWS_BASE_PATH:-/workflows-latest}
      - RIVET_KEY=${RIVET_KEY:-}
      - RIVET_REQUIRE_UI_GATE_KEY=${RIVET_REQUIRE_UI_GATE_KEY:-false}
      - RIVET_UI_TOKEN_FREE_HOSTS=${RIVET_UI_TOKEN_FREE_HOSTS:-}
    volumes:
      - ../nginx/default.dev.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../../image/proxy/normalize-workflow-paths.sh:/normalize-workflow-paths.sh:ro
      - ../../image/proxy/ui-gate-prompt.html:/usr/share/nginx/html/ui-gate-prompt.html:ro
    entrypoint: ["/bin/sh", "/normalize-workflow-paths.sh"]
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      executor:
        condition: service_started
    restart: unless-stopped

  web:
    image: node:20-alpine
    working_dir: /workspace/wrapper/web
    env_file:
      - ../../.env
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-${HTTP_PROXY:-}}
      - https_proxy=${https_proxy:-${HTTPS_PROXY:-}}
      - all_proxy=${all_proxy:-${ALL_PROXY:-}}
      - no_proxy=${no_proxy:-${NO_PROXY:-}}
      - npm_config_cache=/root/.npm
      - YARN_CACHE_FOLDER=/root/.cache/yarn
      - VITE_RIVET_DEBUG_LOGS=${VITE_RIVET_DEBUG_LOGS:-false}
      - RIVET_PUBLISHED_WORKFLOWS_BASE_PATH=${RIVET_PUBLISHED_WORKFLOWS_BASE_PATH:-/workflows}
      - RIVET_LATEST_WORKFLOWS_BASE_PATH=${RIVET_LATEST_WORKFLOWS_BASE_PATH:-/workflows-latest}
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - ../..:/workspace
      - rivet_node_modules:/workspace/rivet/node_modules
      - wrapper_web_node_modules:/workspace/wrapper/web/node_modules
      - npm_cache:/root/.npm
      - yarn_cache:/root/.cache/yarn
    command: >
      sh -lc "
        corepack enable &&
        corepack prepare yarn@4.6.0 --activate &&
        cd /workspace/rivet &&
        if [ ! -f node_modules/.yarn.lock ] || ! cmp -s yarn.lock node_modules/.yarn.lock; then
          YARN_NODE_LINKER=node-modules YARN_CHECKSUM_BEHAVIOR=ignore yarn install --immutable ||
          YARN_NODE_LINKER=node-modules YARN_CHECKSUM_BEHAVIOR=ignore yarn install;
          cp yarn.lock node_modules/.yarn.lock;
        fi &&
        cd /workspace/wrapper/web &&
        if [ ! -f node_modules/.package-lock.json ] || ! cmp -s package-lock.json node_modules/.package-lock.json; then
          npm ci --legacy-peer-deps &&
          cp package-lock.json node_modules/.package-lock.json;
        fi &&
        npm run dev -- --host 0.0.0.0 --strictPort
      "
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:5174/', (res) => process.exit(res.statusCode && res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      start_period: 180s
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.api
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-${HTTP_PROXY:-}}
        https_proxy: ${https_proxy:-${HTTPS_PROXY:-}}
        all_proxy: ${all_proxy:-${ALL_PROXY:-}}
        no_proxy: ${no_proxy:-${NO_PROXY:-}}
    env_file:
      - ../../.env
    working_dir: /app
    ports:
      - "${RIVET_API_PORT:-3100}:80"
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-${HTTP_PROXY:-}}
      - https_proxy=${https_proxy:-${HTTPS_PROXY:-}}
      - all_proxy=${all_proxy:-${ALL_PROXY:-}}
      - no_proxy=${no_proxy:-${NO_PROXY:-}}
      - npm_config_cache=/root/.npm
      - PORT=80
      - RIVET_WORKSPACE_ROOT=/workspace
      - RIVET_WORKFLOWS_ROOT=/workflows
      - RIVET_APP_DATA_ROOT=/data/rivet-app
      - RIVET_RUNTIME_LIBRARIES_ROOT=/data/runtime-libraries
      - RIVET_RUNTIME_PROCESS_ROLE=api
      - RIVET_PUBLISHED_WORKFLOWS_BASE_PATH=${RIVET_PUBLISHED_WORKFLOWS_BASE_PATH:-/workflows}
      - RIVET_LATEST_WORKFLOWS_BASE_PATH=${RIVET_LATEST_WORKFLOWS_BASE_PATH:-/workflows-latest}
      - RIVET_STORAGE_MODE
      - RIVET_DATABASE_MODE
      - RIVET_DATABASE_CONNECTION_STRING
      - RIVET_DATABASE_SSL_MODE
      - RIVET_STORAGE_URL
      - RIVET_STORAGE_BUCKET
      - RIVET_STORAGE_REGION
      - RIVET_STORAGE_ENDPOINT
      - RIVET_STORAGE_ACCESS_KEY_ID
      - RIVET_STORAGE_ACCESS_KEY
      - RIVET_STORAGE_PREFIX
      - RIVET_STORAGE_FORCE_PATH_STYLE
      - RIVET_RUNTIME_LIBRARIES_SYNC_POLL_INTERVAL_MS
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
      - RIVET_ENV_ALLOWLIST=${RIVET_ENV_ALLOWLIST:-}
      - RIVET_SHELL_ALLOWLIST=${RIVET_SHELL_ALLOWLIST:-}
      - RIVET_EXTRA_ROOTS=${RIVET_EXTRA_ROOTS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_ORG_ID=${OPENAI_ORG_ID:-}
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT:-}
    volumes:
      - ../..:/workspace
      - ../../wrapper/api:/app
      - ../../wrapper/shared:/shared
      - ../../wrapper/bootstrap/proxy-bootstrap:/opt/proxy-bootstrap
      - wrapper_api_node_modules:/app/node_modules
      - proxy_bootstrap_node_modules:/opt/proxy-bootstrap/node_modules
      - npm_cache:/root/.npm
      - ${RIVET_WORKFLOWS_HOST_PATH:-../../workflows}:/workflows
      - rivet_data:/data/rivet-app
      - ${RIVET_RUNTIME_LIBS_HOST_PATH:-rivet_runtime_libs}:/data/runtime-libraries
    command: >
      sh -lc "
        cd /app &&
        if [ ! -f /opt/proxy-bootstrap/node_modules/.package-lock.json ] || ! cmp -s /opt/proxy-bootstrap/package-lock.json /opt/proxy-bootstrap/node_modules/.package-lock.json; then
          npm --prefix /opt/proxy-bootstrap ci &&
          cp /opt/proxy-bootstrap/package-lock.json /opt/proxy-bootstrap/node_modules/.package-lock.json;
        fi &&
        if [ ! -f node_modules/.package-lock.json ] || ! cmp -s /app/package-lock.json node_modules/.package-lock.json; then
          npm ci &&
          cp /app/package-lock.json node_modules/.package-lock.json;
        fi &&
        NODE_OPTIONS='${NODE_OPTIONS:-} --import=/opt/proxy-bootstrap/bootstrap.mjs' npm run dev
      "
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:80/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      start_period: 120s
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  executor:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.executor
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-${HTTP_PROXY:-}}
        https_proxy: ${https_proxy:-${HTTPS_PROXY:-}}
        all_proxy: ${all_proxy:-${ALL_PROXY:-}}
        no_proxy: ${no_proxy:-${NO_PROXY:-}}
    env_file:
      - ../../.env
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-${HTTP_PROXY:-}}
      - https_proxy=${https_proxy:-${HTTPS_PROXY:-}}
      - all_proxy=${all_proxy:-${ALL_PROXY:-}}
      - no_proxy=${no_proxy:-${NO_PROXY:-}}
      - npm_config_cache=/root/.npm
      - YARN_CACHE_FOLDER=/root/.cache/yarn
      - HOME=/root
      - RIVET_RUNTIME_LIBRARIES_ROOT=/data/runtime-libraries
      - RIVET_RUNTIME_PROCESS_ROLE=executor
      - RIVET_STORAGE_MODE
      - RIVET_DATABASE_MODE
      - RIVET_DATABASE_CONNECTION_STRING
      - RIVET_DATABASE_SSL_MODE
      - RIVET_STORAGE_URL
      - RIVET_STORAGE_BUCKET
      - RIVET_STORAGE_REGION
      - RIVET_STORAGE_ENDPOINT
      - RIVET_STORAGE_ACCESS_KEY_ID
      - RIVET_STORAGE_ACCESS_KEY
      - RIVET_STORAGE_FORCE_PATH_STYLE
      - RIVET_RUNTIME_LIBRARIES_SYNC_POLL_INTERVAL_MS
    volumes:
      - npm_cache:/root/.npm
      - yarn_cache:/root/.cache/yarn
      - rivet_data:/root/.local/share/com.ironcladapp.rivet
      - ${RIVET_RUNTIME_LIBS_HOST_PATH:-rivet_runtime_libs}:/data/runtime-libraries
    restart: unless-stopped

volumes:
  rivet_node_modules:
    driver: local
  wrapper_web_node_modules:
    driver: local
  wrapper_api_node_modules:
    driver: local
  proxy_bootstrap_node_modules:
    driver: local
  npm_cache:
    driver: local
  yarn_cache:
    driver: local
  rivet_data:
    driver: local
  rivet_runtime_libs:
    driver: local
