map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $host $rivet_ui_host_is_token_free {
    default 0;
    ~${RIVET_UI_TOKEN_FREE_HOSTS_REGEX} 1;
}

map $arg_token $rivet_ui_has_valid_query_token {
    default 0;
    "${RIVET_ENDPOINT_API_KEY}" 1;
}

map $cookie_rivet_ui_token $rivet_ui_has_valid_cookie_token {
    default 0;
    "${RIVET_ENDPOINT_API_KEY}" 1;
}

map "$rivet_ui_host_is_token_free:$rivet_ui_has_valid_query_token:$rivet_ui_has_valid_cookie_token" $rivet_ui_gate_result {
    default deny;
    "1:0:0" allow;
    "1:0:1" allow;
    "1:1:0" allow;
    "1:1:1" allow;
    "0:0:1" allow;
    "0:1:0" allow_with_cookie;
    "0:1:1" allow_with_cookie;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # Static frontend assets
    location / {
        if ($rivet_ui_gate_result = deny) {
            return 403;
        }

        if ($rivet_ui_gate_result = allow_with_cookie) {
            return 418;
        }

        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @web_with_token_cookie {
        add_header Set-Cookie "rivet_ui_token=${RIVET_ENDPOINT_API_KEY}; Path=/; HttpOnly; SameSite=Lax" always;
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API backend
    location /api/ {
        if ($rivet_ui_gate_result = deny) {
            return 403;
        }

        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Published workflow execution endpoints
    location ${RIVET_PUBLISHED_WORKFLOWS_BASE_PATH}/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ${RIVET_LATEST_WORKFLOWS_BASE_PATH}/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /ws/latest-debugger {
        if ($rivet_ui_gate_result = deny) {
            return 403;
        }

        proxy_pass http://api/ws/latest-debugger;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Executor WebSocket - internal (rewrite /ws/executor/internal -> /internal)
    location /ws/executor/internal {
        if ($rivet_ui_gate_result = deny) {
            return 403;
        }

        proxy_pass http://executor:21889/internal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Executor WebSocket - external/debugger (rewrite /ws/executor -> /)
    location /ws/executor {
        if ($rivet_ui_gate_result = deny) {
            return 403;
        }

        proxy_pass http://executor:21889/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    error_page 418 = @web_with_token_cookie;
}
